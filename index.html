<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti 🌸</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');
:root{--pink:#ff69b4;--deep:#c71585;--purple:#9b30c8;--soft:#ffb6d9;--gold:#ffd4a8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;height:100vh;width:100vw;font-family:'Dancing Script',cursive;}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
.scene{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;}
.title-wrap{text-align:center;opacity:0;transform:translateY(-30px) scale(0.85);transition:opacity 1.4s ease,transform 1.4s ease;pointer-events:none;padding:0 24px;}
.title-wrap.visible{opacity:1;transform:translateY(0) scale(1);}
.title{font-family:'Dancing Script',cursive;font-size:clamp(2.4rem,8vw,5.5rem);font-weight:700;line-height:1.15;color:#fff;text-shadow:0 0 12px var(--pink),0 0 30px var(--deep),0 0 65px var(--purple),0 0 100px var(--pink);animation:titlePulse 3s ease-in-out infinite alternate;}
@keyframes titlePulse{from{text-shadow:0 0 12px var(--pink),0 0 30px var(--deep),0 0 65px var(--purple);}to{text-shadow:0 0 22px var(--soft),0 0 55px var(--pink),0 0 100px var(--deep),0 0 140px var(--purple);}}
.poem{margin-top:18px;opacity:0;max-height:0;overflow:hidden;transition:opacity 1.6s ease 0.3s,max-height 1.6s ease 0.3s;text-align:center;padding:0 28px;}
.poem.visible{opacity:1;max-height:300px;}
.poem p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(0.95rem,3vw,1.35rem);color:var(--soft);line-height:1.8;letter-spacing:0.5px;text-shadow:0 0 14px var(--deep),0 0 25px var(--purple);}
.poem .roses{margin-top:10px;font-size:clamp(1.4rem,4vw,2rem);filter:drop-shadow(0 0 8px var(--pink));animation:floatEmoji 3s ease-in-out infinite;}
@keyframes floatEmoji{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.buttons{position:fixed;bottom:38px;left:50%;transform:translateX(-50%);display:flex;gap:18px;z-index:50;}
.btn{border:none;outline:none;cursor:pointer;border-radius:50px;font-family:'Dancing Script',cursive;font-size:clamp(1rem,3vw,1.2rem);font-weight:700;letter-spacing:1px;padding:13px 28px;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.3s;}
.btn:hover{transform:scale(1.08) translateY(-2px);}
.btn:active{transform:scale(0.96);}
.btn1{background:linear-gradient(135deg,#1a0030,#3d0060);color:#e0b0ff;border:1.5px solid #9b30c8;box-shadow:0 0 18px #9b30c855,0 4px 16px #00000088;}
.btn1.active{box-shadow:0 0 30px #c71585,0 0 55px #9b30c8;border-color:var(--pink);color:#fff;}
.btn2{background:linear-gradient(135deg,#200025,#500040);color:#ffb6d9;border:1.5px solid var(--deep);box-shadow:0 0 18px #c7158544,0 4px 16px #00000088;}
.btn2.active{box-shadow:0 0 30px var(--pink),0 0 55px var(--deep);border-color:var(--soft);color:#fff;}
.btn3{background:linear-gradient(135deg,#180015,#400030);color:var(--gold);border:1.5px solid #c06030;box-shadow:0 0 18px #c0603044,0 4px 16px #00000088;}
.btn3.active{box-shadow:0 0 30px var(--gold),0 0 55px #ff9060;border-color:var(--gold);color:#fff;}
.credit{position:fixed;bottom:8px;right:16px;font-family:'Cormorant Garamond',serif;font-size:0.7rem;color:rgba(255,182,217,0.3);letter-spacing:1px;z-index:50;}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="scene">
  <div class="title-wrap" id="titleWrap">
    <div class="title">✨ Feliz Día<br>de la Mujer ✨</div>
  </div>
  <div class="poem" id="poem">
    <p>Podrá ser lunes o viernes,<br>un 17 o un 8 de marzo,<br>pero para mí tú eres todos los días<br>la mujer más linda del universo...</p>
    <div class="roses">🥹 🌹 🫂</div>
  </div>
</div>
<div class="buttons">
  <button class="btn btn1" id="b1">1</button>
  <button class="btn btn2" id="b2">2</button>
  <button class="btn btn3" id="b3">Magia ✨</button>
</div>
<div class="credit">para ti 🌸</div>

const canvas=document.getElementById('bgCanvas');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();addEventListener('resize',resize);

let showLotus=false,fullMode=false;

const stars=Array.from({length:220},()=>({
  x:Math.random(),y:Math.random(),
  r:Math.random()*1.6+0.3,
  twinkle:Math.random()*Math.PI*2,
  speed:Math.random()*0.02+0.005,
  color:['#fff','#ffe0f7','#e0b0ff','#ffb6d9','#ffd4a8'][Math.floor(Math.random()*5)]
}));

const shoots=[];
function spawnShoot(){shoots.push({x:Math.random()*2000,y:Math.random()*H*0.5,len:80+Math.random()*120,angle:Math.PI/5+Math.random()*0.3,speed:8+Math.random()*8,alpha:1});}
setInterval(()=>{if(Math.random()<0.4)spawnShoot();},1800);

const particles=Array.from({length:140},()=>({
  x:Math.random(),y:Math.random(),r:Math.random()*2+0.5,
  dx:(Math.random()-0.5)*0.3,dy:-Math.random()*0.5-0.15,
  color:['#ff69b4','#ff1493','#da70d6','#ee82ee','#c71585'][Math.floor(Math.random()*5)],
  alpha:Math.random()
}));

class Lotus{
  constructor(xr,yr,s,delay){
    this.xr=xr;this.yr=yr;this.s=s;
    this.born=Date.now()+delay;
    this.rot=Math.random()*Math.PI*2;
    this.rotS=(Math.random()-0.5)*0.006;
    this.floatA=12+Math.random()*16;
    this.phase=Math.random()*Math.PI*2;
    this.alpha=0;this.hue=295+Math.random()*65;
  }
  petal(ctx,ang,len,w){
    ctx.save();ctx.rotate(ang);
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.bezierCurveTo(w,-len*0.3,w,-len*0.7,0,-len);
    ctx.bezierCurveTo(-w,-len*0.7,-w,-len*0.3,0,0);
    ctx.fill();ctx.restore();
  }
  draw(now){
    if(now<this.born)return;
    const age=(now-this.born)/1000;
    this.alpha=Math.min(1,age*0.7);
    this.rot+=this.rotS;
    const x=this.xr*W;
    const y=this.yr*H+Math.sin(now*0.0008+this.phase)*this.floatA;
    const s=this.s;
    ctx.save();ctx.translate(x,y);ctx.rotate(this.rot);ctx.globalAlpha=this.alpha*0.92;
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2;
      const g=ctx.createRadialGradient(0,-s*0.3,0,0,-s*0.5,s);
      g.addColorStop(0,`hsla(${this.hue},100%,88%,1)`);
      g.addColorStop(0.5,`hsla(${this.hue+15},90%,65%,0.85)`);
      g.addColorStop(1,`hsla(${this.hue-20},80%,42%,0.4)`);
      ctx.fillStyle=g;ctx.shadowBlur=16;ctx.shadowColor=`hsla(${this.hue},100%,72%,0.9)`;
      this.petal(ctx,a,s,s*0.3);
    }
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2+Math.PI/5;
      const g2=ctx.createRadialGradient(0,-s*0.15,0,0,-s*0.3,s*0.55);
      g2.addColorStop(0,`hsla(${this.hue+35},100%,96%,1)`);
      g2.addColorStop(1,`hsla(${this.hue+5},90%,72%,0.8)`);
      ctx.fillStyle=g2;ctx.shadowBlur=8;this.petal(ctx,a,s*0.55,s*0.18);
    }
    const cg=ctx.createRadialGradient(0,0,0,0,0,s*0.2);
    cg.addColorStop(0,`hsla(${this.hue+45},100%,99%,1)`);
    cg.addColorStop(1,`hsla(${this.hue+10},90%,70%,0.8)`);
    ctx.fillStyle=cg;ctx.shadowBlur=22;ctx.shadowColor=`hsla(${this.hue},100%,82%,0.9)`;
    ctx.beginPath();ctx.arc(0,0,s*0.2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

const lotusData=[
  [0.06,0.82,28,400],[0.18,0.90,36,600],[0.32,0.78,22,800],
  [0.48,0.88,42,200],[0.62,0.80,30,1000],[0.76,0.91,25,700],
  [0.90,0.83,38,500],[0.12,0.70,20,900],[0.38,0.96,18,300],
  [0.55,0.72,32,1100],[0.72,0.65,24,1300],[0.96,0.75,29,150],
  [0.26,0.60,19,1500],[0.84,0.58,27,1600],[0.50,0.60,35,1800]
];
const lotuses=lotusData.map(d=>new Lotus(...d));

class Spark{
  constructor(){this.reset();}
  reset(){
    this.x=Math.random();this.y=0.5+Math.random()*0.6;
    this.sz=6+Math.random()*12;this.alpha=0.3+Math.random()*0.5;
    this.dy=-0.0004-Math.random()*0.0004;this.dx=(Math.random()-0.5)*0.0002;
    this.life=1;
    this.sym=['✦','✧','·','∗','˚','⋆'][Math.floor(Math.random()*6)];
    this.color=`hsl(${305+Math.random()*55},100%,${70+Math.random()*25}%)`;
  }
  draw(now){
    ctx.save();ctx.globalAlpha=this.alpha*this.life;ctx.fillStyle=this.color;
    ctx.shadowBlur=8;ctx.shadowColor=this.color;
    ctx.font=`${this.sz}px serif`;ctx.fillText(this.sym,this.x*W,this.y*H);
    ctx.restore();
    this.x+=this.dx;this.y+=this.dy;this.life-=0.002;
    if(this.life<=0)this.reset();
  }
}
const sparks=Array.from({length:55},()=>new Spark());

function render(){
  ctx.clearRect(0,0,W,H);
  const now=Date.now();
  const bg=ctx.createRadialGradient(W*.5,H*.4,0,W*.5,H*.5,W*.85);
  if(fullMode){bg.addColorStop(0,'#120008');bg.addColorStop(0.5,'#080005');bg.addColorStop(1,'#000');}
  else{bg.addColorStop(0,'#04000a');bg.addColorStop(1,'#000');}
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  if(fullMode){
    [[.2,.3,.35],[.8,.6,.3],[.5,.9,.4]].forEach(([xr,yr,rad])=>{
      const g=ctx.createRadialGradient(W*xr,H*yr,0,W*xr,H*yr,W*rad);
      g.addColorStop(0,'rgba(255,20,147,0.09)');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    });
  }
  stars.forEach(s=>{
    const pulse=0.4+0.6*Math.sin(now*s.speed+s.twinkle);
    ctx.save();ctx.globalAlpha=pulse*(fullMode?0.85:0.6);ctx.fillStyle=s.color;
    ctx.shadowBlur=s.r*4;ctx.shadowColor=s.color;
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();ctx.restore();
  });
  for(let i=shoots.length-1;i>=0;i--){
    const sh=shoots[i];
    ctx.save();
    const ex=sh.x+Math.cos(sh.angle)*sh.len,ey=sh.y+Math.sin(sh.angle)*sh.len;
    const g=ctx.createLinearGradient(sh.x,sh.y,ex,ey);
    g.addColorStop(0,'transparent');g.addColorStop(1,`rgba(255,182,217,${sh.alpha})`);
    ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.globalAlpha=sh.alpha;
    ctx.beginPath();ctx.moveTo(sh.x,sh.y);ctx.lineTo(ex,ey);ctx.stroke();ctx.restore();
    sh.x+=Math.cos(sh.angle)*sh.speed;sh.y+=Math.sin(sh.angle)*sh.speed;sh.alpha-=0.018;
    if(sh.alpha<=0||sh.x>W+200)shoots.splice(i,1);
  }
  if(fullMode){
    particles.forEach(p=>{
      ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.globalAlpha=0.35+0.5*Math.sin(now*.002+p.alpha);
      ctx.shadowBlur=5;ctx.shadowColor=p.color;ctx.fill();ctx.globalAlpha=1;ctx.shadowBlur=0;
      p.x+=p.dx/W;p.y+=p.dy/H;
      if(p.y<-0.02)p.y=1.02;if(p.x<0)p.x=1;if(p.x>1)p.x=0;
    });
  }
  if(showLotus)lotuses.forEach(l=>l.draw(now));
  if(fullMode)sparks.forEach(s=>s.draw(now));
  requestAnimationFrame(render);
}
render();

// BUTTONS
const b1=document.getElementById('b1');
const b2=document.getElementById('b2');
const b3=document.getElementById('b3');
const titleWrap=document.getElementById('titleWrap');
const poem=document.getElementById('poem');
let state1=false,state2=false,state3=false;

b1.addEventListener('click',()=>{
  state1=!state1;
  titleWrap.classList.toggle('visible',state1);
  b1.classList.toggle('active',state1);
});
b2.addEventListener('click',()=>{
  state2=!state2;
  showLotus=state2;
  b2.classList.toggle('active',state2);
});
b3.addEventListener('click',()=>{
  state3=!state3;
  if(state3){activateFull();}else{deactivateFull();}
});
function activateFull(){
  state3=true;state1=true;state2=true;showLotus=true;fullMode=true;
  titleWrap.classList.add('visible');poem.classList.add('visible');
  b1.classList.add('active');b2.classList.add('active');b3.classList.add('active');
  startMusic();
}
function deactivateFull(){
  state3=false;fullMode=false;
  poem.classList.remove('visible');b3.classList.remove('active');
  stopMusic();
}

// MUSIC — embedded mp3
let audio=null;
function startMusic(){
  if(!audio){
    audio=new Audio(AUDIO_SRC);
    audio.loop=true;
    audio.volume=0.85;
  }
  audio.currentTime=0;
  audio.play().catch(()=>{});
}
function stopMusic(){
  if(audio){audio.pause();audio.currentTime=0;}
}
